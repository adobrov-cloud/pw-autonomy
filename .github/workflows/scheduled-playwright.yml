name: Scheduled Playwright tests

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: {}

concurrency:
  group: scheduled-playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Playwright (scheduled)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      AUTONOMY_EMAIL: ${{ secrets.AUTONOMY_EMAIL }}
      AUTONOMY_PASSWORD: ${{ secrets.AUTONOMY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
